version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DEMO_MODE=true
      - NEO4J_URI=neo4j://db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - CLIENT_URL=http://localhost:3000
    volumes:
      - ./src/backend:/app/src/backend
      - ./logs:/app/logs
    depends_on:
      - db
    networks:
      - skyfusion

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001/api/v1
      - REACT_APP_WS_URL=ws://localhost:3001
    volumes:
      - ./src/frontend/src:/app/src
      - ./src/frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - skyfusion

  db:
    image: neo4j:5.15.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - skyfusion

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  skyfusion:
    driver: bridge
